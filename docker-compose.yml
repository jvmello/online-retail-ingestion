version: "3.9"

services:

  minio:
    image: minio/minio
    container_name: lakehouse-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    volumes:
      - ./data:/data

  spark:
    image: apache/spark:3.5.1
    container_name: lakehouse-spark
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"
      - "7077:7077"

  jupyter:
    image: jupyter/pyspark-notebook
    container_name: lakehouse-jupyter
    ports:
      - "8888:8888"
    environment:
      JUPYTER_TOKEN: dev
      PYTHONPATH: /home/jovyan
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./data:/home/jovyan/data
      - ./jobs:/home/jovyan/jobs
      - ./transformations:/home/jovyan/transformations

  postgres:
    image: postgres:14
    container_name: lakehouse-postgres
    environment:
      POSTGRES_USER: dbt
      POSTGRES_PASSWORD: dbt
      POSTGRES_DB: warehouse
    ports:
      - "5432:5432"

  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.7.0
    container_name: lakehouse-dbt
    volumes:
      - ./dbt:/usr/app
    working_dir: /usr/app